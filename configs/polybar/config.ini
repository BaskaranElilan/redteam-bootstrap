[colors]
background = #1e1e2e
foreground = #cdd6f4
primary = #89b4fa
alert = #f38ba8
green = #a6e3a1
yellow = #f9e2af

[bar/main]
width = 100%
height = 28
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = JetBrainsMono Nerd Font:size=10;2
modules-left = i3
modules-center = date
modules-right = filesystem memory cpu wlan eth pulseaudio battery
tray-position = right
wm-restack = i3

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = #11111b
label-focused-padding = 2
label-unfocused = %name%
label-unfocused-padding = 2
label-visible = %name%
label-visible-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 5
date = %Y-%m-%d
time = %H:%M
label = %date% %time%

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
label-mounted = / %percentage_used%%

[module/memory]
type = internal/memory
interval = 5
label = RAM %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 5
label = CPU %percentage%%

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5
label-connected = WLAN %essid%
label-disconnected = WLAN down

[module/eth]
type = internal/network
interface-type = wired
interval = 5
label-connected = ETH up
label-disconnected = ETH down

[module/pulseaudio]
type = internal/pulseaudio
label-volume = VOL %percentage%%
label-muted = muted

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
label-charging = CHG %percentage%%
label-discharging = BAT %percentage%%
label-full = FULL
