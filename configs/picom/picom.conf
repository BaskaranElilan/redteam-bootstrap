backend = "glx";
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;

shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.35;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
inactive-opacity = 0.94;
active-opacity = 1.0;
frame-opacity = 1.0;

corner-radius = 6;
rounded-corners-exclude = [
  "class_g = 'Polybar'"
];
